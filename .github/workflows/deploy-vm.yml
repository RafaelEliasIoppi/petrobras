name: Deploy para VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Buildar Vite
        run: npm run build

      - name: Copiar planos para dist
        run: cp -r petrobras-quimica-study-plan/planos dist/planos

      - name: Instalar rsync
        run: sudo apt-get update -q && sudo apt-get install -y rsync

      - name: Instalar chave SSH
        env:
          SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 163.176.163.213 >> ~/.ssh/known_hosts

      - name: Sincronizar dist/
        run: rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no" dist/ ubuntu@163.176.163.213:/opt/petrobras/dist/

      - name: Sincronizar server.js
        run: scp -o StrictHostKeyChecking=no server.js ubuntu@163.176.163.213:/opt/petrobras/server.js

      - name: Sincronizar planos/
        run: rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no" petrobras-quimica-study-plan/planos/ ubuntu@163.176.163.213:/opt/petrobras/planos/

      - name: Reiniciar servico
        run: ssh -o StrictHostKeyChecking=no ubuntu@163.176.163.213 "sudo systemctl restart petrobras.service"
